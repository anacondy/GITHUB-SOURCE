<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="description" content="Repo Vault Archive — A monochrome GitHub repository explorer for browsing repos, readmes, live pages, and action pipelines." />
    <meta name="theme-color" content="#000000" />
    <meta name="color-scheme" content="dark" />

    <!-- Security -->
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />

    <!-- Open Graph -->
    <meta property="og:title" content="Repo Vault Archive" />
    <meta property="og:description" content="A monochrome GitHub repository explorer." />
    <meta property="og:type" content="website" />

    <!-- Performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://api.github.com" />

    <title>Repo Vault Archive — GitHub Source Explorer</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
